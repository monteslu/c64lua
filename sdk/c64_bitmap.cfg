# c64lua linker config: VIC-II multicolor bitmap mode in VIC bank 3.
#
# DOUBLE-BUFFERED: two framebuffers so a game can cls+redraw every frame with
# no tearing. Buffer A = VIC bank 3 ($C000-$FFFF), buffer B = VIC bank 2
# ($8000-$BFFF); endframe flips which one the VIC shows (CIA2 PRA bits 0-1).
#
#   Buffer A: screen $C000-$C3FF (+ sprite ptrs $C3F8), bitmap $E000-$FF3F
#   Buffer B: screen $8000-$83FF (+ sprite ptrs $83F8), bitmap $A000-$BF3F
#
# Both buffers are ABOVE __HIMEM__ ($8000), so the linker never allocates there;
# the runtime addresses them directly (c64_api.c). Code + data therefore live in
# $0801-$7FFF (~30KB - ample; the examples are ~13KB .prg). Color RAM is fixed
# hardware at $D800, SHARED by both buffers (fine under full redraw). Only the
# KERNAL is banked out ($01=$35) so the CPU sees RAM at buffer A's $E000 bitmap;
# the VIC reads the RAM beneath the KERNAL regardless. Buffer B's screen ($8000)
# is plain RAM, but its bitmap ($A000-$BFFF) sits under the (still-mapped) BASIC
# ROM: the VIC shows the RAM there, and c64lua's draw primitives write whole
# bytes for filled spans, so the framebuffer is correct. (Banking BASIC out to
# make per-pixel read-modify-write of buffer B read RAM instead of ROM tripped
# VICE's disk-autostart trampoline and reset the machine, so BASIC stays in.)

FEATURES {
    STARTADDRESS: default = $0801;
}
SYMBOLS {
    __LOADADDR__:  type = import;
    __EXEHDR__:    type = import;
    __STACKSIZE__: type = weak, value = $0800;   # 2K cc65 C stack
    __HIMEM__:     type = weak, value = $8000;    # code/data stay below buffer B
}
MEMORY {
    ZP:       file = "", define = yes, start = $0002, size = $001A;
    LOADADDR: file = %O,               start = $07FF, size = $0002;
    HEADER:   file = %O, define = yes, start = $0801, size = $000D;
    MAIN:     file = %O, define = yes, start = __HEADER_LAST__, size = __HIMEM__ - __HEADER_LAST__;
    BSS:      file = "",               start = __ONCE_RUN__, size = __HIMEM__ - __STACKSIZE__ - __ONCE_RUN__;
}
SEGMENTS {
    ZEROPAGE: load = ZP,       type = zp;
    LOADADDR: load = LOADADDR, type = ro;
    EXEHDR:   load = HEADER,   type = ro;
    STARTUP:  load = MAIN,     type = ro;
    LOWCODE:  load = MAIN,     type = ro,  optional = yes;
    CODE:     load = MAIN,     type = ro;
    RODATA:   load = MAIN,     type = ro;
    DATA:     load = MAIN,     type = rw;
    INIT:     load = MAIN,     type = rw;
    ONCE:     load = MAIN,     type = ro,  define = yes;
    BSS:      load = BSS,      type = bss, define = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATA;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATA,
            import  = __CALLIRQ__;
}
